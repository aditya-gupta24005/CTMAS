<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTMAS — Cyber-Physical Threat Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.10.3/umd/Recharts.js"></script>
  <style>
    body { background: #0a0e1a; color: #e2e8f0; font-family: 'Courier New', monospace; }
    .glow-red    { box-shadow: 0 0 18px rgba(239,68,68,0.8); }
    .glow-orange { box-shadow: 0 0 14px rgba(249,115,22,0.7); }
    .glow-yellow { box-shadow: 0 0 12px rgba(234,179,8,0.6); }
    .glow-green  { box-shadow: 0 0 8px rgba(34,197,94,0.4); }
    @keyframes pulse-ring { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes flash { 0%,100%{background-color: rgba(239,68,68,0.0)} 50%{background-color: rgba(239,68,68,0.25)} }
    .pulse { animation: pulse-ring 1.4s ease-in-out infinite; }
    .flash { animation: flash 1.0s ease-in-out infinite; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = Recharts;
    const API_BASE = "http://localhost:8000";
    const WS_BASE = "ws://localhost:8000";

    const STAGES = ["P1","P2","P3","P4","P5","P6"];
    const STAGE_LABELS = {
      P1:"Raw Intake", P2:"Chem Dosing", P3:"Filtration",
      P4:"UV Dechlorin.", P5:"RO Membrane", P6:"Output"
    };
    const EDGES = [[0,1],[1,2],[2,3],[3,4],[4,5],[2,0],[4,0]];
    const NODE_POS = [
      {x:80,y:160},{x:220,y:160},{x:360,y:160},
      {x:500,y:160},{x:640,y:160},{x:780,y:160}
    ];

    const COLOR = {
      green:"#22c55e", yellow:"#eab308", orange:"#f97316", red:"#ef4444",
      blue:"#38bdf8", slate:"#64748b", panel:"#0f172a", border:"#1e293b",
    };
    const LABEL_COLOR = { TP:"#22c55e", TN:"#64748b", FP:"#f97316", FN:"#ef4444" };
    const LABEL_TEXT = {
      TP:"TRUE POSITIVE — caught real attack",
      FP:"FALSE POSITIVE — false alarm on normal data",
      FN:"FALSE NEGATIVE — missed real attack",
      TN:"TRUE NEGATIVE — correctly silent on normal",
    };

    function severityColor(sev) {
      if (sev >= 3) return COLOR.red;
      if (sev === 2) return COLOR.orange;
      if (sev === 1) return COLOR.yellow;
      return COLOR.green;
    }
    function stateColor(state) {
      const m = {NORMAL:COLOR.green, RECON:COLOR.yellow, INTRUSION:COLOR.orange, IMPACT:COLOR.red};
      return m[state] || COLOR.slate;
    }

    // ─────────────────────────────────────────────────────────────────────
    function GroundTruthBanner({ frame }) {
      if (!frame) return null;
      const isAttack = frame.ground_truth_attack;
      const detected = frame.predicted_attack;
      const label = frame.detection_label;
      const lc = LABEL_COLOR[label] || COLOR.slate;
      const event = frame.current_event;

      return (
        <div className="grid grid-cols-2 gap-3 mb-3">
          {/* Ground truth */}
          <div className={`rounded-lg p-4 border-2 transition-all duration-200 ${isAttack ? "flash" : ""}`}
               style={{
                 borderColor: isAttack ? COLOR.red : COLOR.green,
                 background: isAttack ? "rgba(239,68,68,0.10)" : "rgba(34,197,94,0.06)",
               }}>
            <div className="text-xs text-slate-500 uppercase tracking-widest">Ground Truth</div>
            <div className="text-2xl font-bold mt-1" style={{ color: isAttack ? COLOR.red : COLOR.green }}>
              {isAttack ? "🚨 ATTACK IN PROGRESS" : "✓ NORMAL OPERATION"}
            </div>
            {event && (
              <div className="text-xs text-slate-400 mt-1">
                Event #{event.id+1} · windows {event.start}–{event.end} · duration {event.duration_windows*10}s
              </div>
            )}
          </div>

          {/* Model decision + classification */}
          <div className="rounded-lg p-4 border-2 transition-all duration-200"
               style={{ borderColor: lc, background: `${lc}1a` }}>
            <div className="text-xs text-slate-500 uppercase tracking-widest">Model Decision</div>
            <div className="text-2xl font-bold mt-1" style={{ color: detected ? COLOR.red : COLOR.green }}>
              {detected ? "⚠ DETECTED" : "○ QUIET"}
            </div>
            <div className="flex items-center gap-2 mt-1">
              <span className="badge" style={{ background: lc, color: "#0a0e1a" }}>{label}</span>
              <span className="text-xs text-slate-400">{LABEL_TEXT[label]}</span>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────
    function StatsBar({ counters, f1, totalSeen, total }) {
      if (!counters) return null;
      const tp = counters.TP, fp = counters.FP, fn = counters.FN, tn = counters.TN;
      const prec = tp / Math.max(1, tp + fp);
      const rec = tp / Math.max(1, tp + fn);
      const fpr = fp / Math.max(1, fp + tn);
      const StatBlock = ({label, value, color, sub}) => (
        <div className="bg-slate-900 rounded px-3 py-2 border border-slate-800 flex flex-col">
          <div className="text-[10px] uppercase tracking-widest text-slate-500">{label}</div>
          <div className="text-lg font-bold leading-tight" style={{color}}>{value}</div>
          {sub && <div className="text-[10px] text-slate-500">{sub}</div>}
        </div>
      );
      return (
        <div className="grid grid-cols-8 gap-2 mb-3">
          <StatBlock label="TP" value={tp.toLocaleString()} color={COLOR.green}/>
          <StatBlock label="TN" value={tn.toLocaleString()} color={COLOR.slate}/>
          <StatBlock label="FP" value={fp.toLocaleString()} color={COLOR.orange}/>
          <StatBlock label="FN" value={fn.toLocaleString()} color={COLOR.red}/>
          <StatBlock label="Precision" value={prec.toFixed(3)} color={COLOR.blue}/>
          <StatBlock label="Recall"    value={rec.toFixed(3)} color={COLOR.blue}/>
          <StatBlock label="FPR"       value={fpr.toFixed(3)} color={COLOR.blue}/>
          <StatBlock label="F1 (live)" value={(f1||0).toFixed(3)} color={COLOR.blue}
                     sub={`${totalSeen||0} / ${total||0} windows`}/>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────
    function Timeline({ total, windowIdx, events, onSeek }) {
      const ref = useRef(null);
      const W = 1200, H = 28;
      const x = (i) => (i / Math.max(1, total)) * W;

      const handleClick = (e) => {
        if (!ref.current) return;
        const rect = ref.current.getBoundingClientRect();
        const px = e.clientX - rect.left;
        const idx = Math.round((px / rect.width) * total);
        onSeek?.(idx);
      };

      return (
        <div className="bg-slate-900 rounded-lg p-3 border border-slate-800 mb-3">
          <div className="flex items-center justify-between mb-1">
            <div className="text-xs text-slate-500 uppercase tracking-widest">Test-set Timeline</div>
            <div className="text-xs text-slate-400">
              window {windowIdx?.toLocaleString() ?? "—"} / {total?.toLocaleString() ?? "—"}
              <span className="text-slate-600 ml-3">red bands = ground-truth attack events · click to seek</span>
            </div>
          </div>
          <svg ref={ref} viewBox={`0 0 ${W} ${H}`} className="w-full cursor-pointer"
               style={{height:32}} onClick={handleClick} preserveAspectRatio="none">
            <rect x={0} y={0} width={W} height={H} fill="#0f172a"/>
            {events.map((ev, i) => (
              <rect key={i} x={x(ev.start)} y={2} width={Math.max(1.5, x(ev.end) - x(ev.start))}
                    height={H-4} fill={COLOR.red} opacity={0.55}/>
            ))}
            {windowIdx != null && (
              <line x1={x(windowIdx)} y1={0} x2={x(windowIdx)} y2={H}
                    stroke={COLOR.blue} strokeWidth={2}/>
            )}
          </svg>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────
    function Controls({ speed, paused, onSpeed, onPause, onJumpAttack, onReconnect, connected, modelChoice, onModelChange }) {
      const SpeedBtn = ({ v }) => (
        <button onClick={() => onSpeed(v)}
          className={`text-xs px-2 py-1 rounded border transition-colors ${
            speed === v ? "bg-sky-600 border-sky-500 text-white" : "border-slate-600 text-slate-300 hover:bg-slate-800"
          }`}>{v}×</button>
      );
      return (
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-xs text-slate-500 uppercase tracking-widest mr-1">Model</span>
          <select
            value={modelChoice}
            onChange={(e) => onModelChange(e.target.value)}
            className="text-xs px-2 py-1 rounded border border-slate-600 bg-slate-900 text-slate-200"
          >
            <option value="neural">Neural</option>
            <option value="xgboost">XGBoost</option>
          </select>
          <span className="mx-2 text-slate-700">│</span>
          <span className="text-xs text-slate-500 uppercase tracking-widest mr-1">Speed</span>
          <SpeedBtn v={1}/> <SpeedBtn v={10}/> <SpeedBtn v={50}/> <SpeedBtn v={100}/>
          <span className="mx-2 text-slate-700">│</span>
          <button onClick={onPause}
            className="text-xs px-3 py-1 rounded border border-slate-600 text-slate-300 hover:bg-slate-800">
            {paused ? "▶ Resume" : "⏸ Pause"}
          </button>
          <button onClick={onJumpAttack}
            className="text-xs px-3 py-1 rounded border border-orange-700 text-orange-300 hover:bg-orange-900/30">
            ⏭ Jump to next attack
          </button>
          <button onClick={onReconnect}
            className="text-xs px-3 py-1 rounded border border-slate-600 text-slate-300 hover:bg-slate-800">
            Reconnect
          </button>
          <div className="ml-auto flex items-center gap-2">
            <div className={`w-2 h-2 rounded-full ${connected ? "bg-green-500" : "bg-red-500"}`}/>
            <span className="text-xs text-slate-400">{connected ? "LIVE" : "DISCONNECTED"}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────
    function PlantGraph({ frame }) {
      const errs = frame?.node_errors;
      const anomMask = frame?.node_anomaly;
      const thr = frame?.node_threshold;
      return (
        <svg viewBox="0 0 860 240" className="w-full" style={{background:"#0f172a",borderRadius:8}}>
          {EDGES.map(([a,b],i) => (
            <line key={i}
              x1={NODE_POS[a].x} y1={NODE_POS[a].y}
              x2={NODE_POS[b].x} y2={NODE_POS[b].y}
              stroke="#334155" strokeWidth="2" strokeDasharray="4 3"
              markerEnd="url(#arrow)"/>
          ))}
          <defs>
            <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
              <path d="M0,0 L0,6 L6,3 z" fill="#334155"/>
            </marker>
          </defs>
          {STAGES.map((s,i) => {
            const pos = NODE_POS[i];
            const err = errs ? errs[i] : 0;
            const t = thr ? thr[i] : null;
            const anom = anomMask ? anomMask[i] : false;
            const ratio = t ? err / t : 0;
            const col = anom ? COLOR.red : ratio > 0.7 ? COLOR.yellow : COLOR.green;
            const r = 36;
            return (
              <g key={s}>
                {anom && (
                  <circle cx={pos.x} cy={pos.y} r={r+9} fill="none"
                          stroke={COLOR.red} strokeWidth="2" opacity="0.6" className="pulse"/>
                )}
                <circle cx={pos.x} cy={pos.y} r={r} fill="#1e293b" stroke={col} strokeWidth="2.5"/>
                <text x={pos.x} y={pos.y-8} textAnchor="middle" fill={col} fontSize="14" fontWeight="bold">{s}</text>
                <text x={pos.x} y={pos.y+8} textAnchor="middle" fill="#94a3b8" fontSize="9">{STAGE_LABELS[s]}</text>
                <text x={pos.x} y={pos.y+22} textAnchor="middle" fill={col} fontSize="9">
                  {err != null ? err.toFixed(5) : "—"}
                </text>
              </g>
            );
          })}
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────────────────────
    function NodeErrorBars({ errs, thr }) {
      if (!errs) return null;
      const max = Math.max(...errs, ...(thr||[0]), 0.001) * 1.1;
      return (
        <div className="grid grid-cols-6 gap-2">
          {STAGES.map((s,i) => {
            const e = errs[i] || 0;
            const t = thr ? thr[i] : null;
            const pct = Math.min(100, (e/max)*100);
            const tpct = t ? Math.min(100, (t/max)*100) : null;
            const col = e > (t||Infinity) ? COLOR.red : e > (t||Infinity)*0.7 ? COLOR.yellow : COLOR.green;
            return (
              <div key={s} className="flex flex-col items-center gap-1">
                <div className="text-xs text-slate-400">{s}</div>
                <div className="relative w-full h-24 bg-slate-800 rounded" style={{minWidth:32}}>
                  <div className="absolute bottom-0 w-full rounded transition-all duration-200"
                       style={{height:`${pct}%`, background:col, opacity:0.85}}/>
                  {tpct !== null && (
                    <div className="absolute w-full"
                         style={{bottom:`${tpct}%`,borderTop:"1px dashed #ef4444"}}
                         title={`threshold = ${t.toFixed(5)}`}/>
                  )}
                </div>
                <div className="text-xs" style={{color:col}}>{e.toFixed(4)}</div>
                <div className="text-[10px] text-slate-600">thr {t ? t.toFixed(4) : "—"}</div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────
    function SignalChart({ history, thresholdLine, label, color, formatter }) {
      const data = history.slice(-200).map((p,i) => ({i, ...p}));
      return (
        <ResponsiveContainer width="100%" height={150}>
          <LineChart data={data} margin={{top:6,right:8,bottom:4,left:0}}>
            <CartesianGrid strokeDasharray="2 4" stroke="#1e293b"/>
            <XAxis dataKey="i" hide/>
            <YAxis domain={['auto','auto']} tick={{fill:"#64748b",fontSize:9}}/>
            <Tooltip
              contentStyle={{background:"#1e293b",border:"1px solid #334155",fontSize:10}}
              formatter={(v) => [formatter ? formatter(v) : v.toFixed(5), label]}/>
            {thresholdLine != null && (
              <ReferenceLine y={thresholdLine} stroke="#ef4444" strokeDasharray="3 3"
                label={{value:`thr=${formatter ? formatter(thresholdLine) : thresholdLine.toFixed(4)}`, fill:"#ef4444", fontSize:9, position:"insideTopRight"}}/>
            )}
            <Line type="monotone" dataKey="v" dot={false} stroke={color} strokeWidth={1.5}/>
            {/* attack-region overlay (red dots when ground_truth_attack) */}
            <Line type="monotone" dataKey="gt" dot={{r:1.5, fill:"#ef4444"}} stroke="none"/>
          </LineChart>
        </ResponsiveContainer>
      );
    }

    // ─────────────────────────────────────────────────────────────────────
    function FsmBar({ state, stage, impactProb, minutesToImpact }) {
      const states = ["NORMAL","RECON","INTRUSION","IMPACT"];
      return (
        <div>
          <div className="flex gap-1 mb-2">
            {states.map((s,i) => {
              const active = s === state;
              const past = i < states.indexOf(state);
              const col = stateColor(s);
              return (
                <div key={s} className="flex-1 text-center py-1.5 rounded text-xs font-bold transition-all duration-300"
                  style={{
                    background: active ? col : past ? col+"33" : "#1e293b",
                    color: active ? "#0a0e1a" : past ? col : "#475569",
                    border: `1px solid ${active ? col : "#334155"}`,
                    transform: active ? "scale(1.04)" : "scale(1)"
                  }}>
                  {s}
                </div>
              );
            })}
          </div>
          <div className="flex gap-4 text-xs text-slate-400">
            <span>Stage <span className="text-white font-bold">{stage}/3</span></span>
            <span>Impact prob: <span style={{color: stateColor(state)}} className="font-bold">{(impactProb*100).toFixed(0)}%</span></span>
            {minutesToImpact != null && (
              <span>ETA: <span className="text-orange-400 font-bold">{minutesToImpact?.toFixed(1)}min</span></span>
            )}
          </div>
        </div>
      );
    }

    function MitreTechniques({ techniques }) {
      if (!techniques || techniques.length === 0)
        return <div className="text-slate-600 text-xs italic">No active techniques</div>;
      return (
        <div className="flex flex-col gap-1.5">
          {techniques.map(t => (
            <div key={t.id} className="bg-slate-800 rounded p-2 border border-slate-700">
              <div className="flex gap-2 items-center">
                <span className="text-xs font-bold text-orange-400 font-mono">{t.id}</span>
                <span className="text-xs text-white">{t.name}</span>
                <span className="ml-auto text-xs text-slate-500">{t.tactic}</span>
              </div>
              <div className="text-xs text-slate-400 mt-0.5 leading-tight">{t.description?.slice(0,120)}…</div>
            </div>
          ))}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────
    function App() {
      const initialModel = (() => {
        const params = new URLSearchParams(window.location.search);
        return params.get("model") === "xgboost" ? "xgboost" : "neural";
      })();
      const [modelChoice, setModelChoice] = useState(initialModel);
      const [connected, setConnected] = useState(false);
      const [error, setError] = useState(null);
      const [meta, setMeta] = useState(null);
      const [frame, setFrame] = useState(null);
      const [paused, setPaused] = useState(false);
      const [speed, setSpeed] = useState(10);

      // History buffers for charts: [{i,v,gt}]
      const [zHistory, setZHistory] = useState([]);
      const [ewmaHistory, setEwmaHistory] = useState([]);

      const wsRef = useRef(null);
      const pausedRef = useRef(false);
      pausedRef.current = paused;

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        params.set("model", modelChoice);
        window.history.replaceState({}, "", `${window.location.pathname}?${params.toString()}`);
        setMeta(null);
        setFrame(null);
        setZHistory([]);
        setEwmaHistory([]);
        fetch(`${API_BASE}/metadata?model=${modelChoice}`)
          .then(r => r.json())
          .then(setMeta)
          .catch(e => setError(`Could not reach API at ${API_BASE} — is uvicorn running?`));
      }, [modelChoice]);

      const send = (obj) => {
        if (wsRef.current && wsRef.current.readyState === 1) wsRef.current.send(JSON.stringify(obj));
      };

      const connect = useCallback(() => {
        if (wsRef.current) wsRef.current.close();
        const ws = new WebSocket(`${WS_BASE}/ws/stream?model=${modelChoice}`);
        wsRef.current = ws;
        ws.onopen = () => {
          setConnected(true); setError(null);
          // Push initial speed
          ws.send(JSON.stringify({cmd:"set_speed", value: speed}));
        };
        ws.onclose = () => setConnected(false);
        ws.onerror = () => setError("WebSocket error — is the API running?");
        ws.onmessage = (e) => {
          if (pausedRef.current) return;
          const d = JSON.parse(e.data);
          if (d.error) { setError(d.error); return; }
          setFrame(d);
          setZHistory(h => [...h.slice(-300), {v: d.z_score_sum, gt: d.ground_truth_attack ? d.z_score_sum : null}]);
          setEwmaHistory(h => [...h.slice(-300), {v: d.ewma_score, gt: d.ground_truth_attack ? d.ewma_score : null}]);
        };
      }, [speed, modelChoice]);

      useEffect(() => { connect(); return () => wsRef.current?.close(); }, [connect]);

      const onSpeed = (v) => { setSpeed(v); send({cmd:"set_speed", value:v}); };
      const onPause = () => {
        const np = !paused; setPaused(np);
        send({cmd: np ? "pause" : "resume"});
      };
      const onJumpAttack = () => send({cmd:"jump_next_attack"});
      const onSeek = (idx) => send({cmd:"jump_to", value: idx});

      const events = meta?.attack_events || [];
      const total = meta?.n_test_windows || (frame?.n_test_windows ?? 0);

      const scoreLabel = meta?.score_label || frame?.score_label || "Detection Score";
      const nodePanelTitle = modelChoice === "xgboost"
        ? "Per-Stage Deviation Score"
        : "Per-Stage Reconstruction Error";

      return (
        <div className="min-h-screen p-4">
          {/* Header */}
          <div className="flex items-center justify-between mb-3 border-b border-slate-800 pb-2">
            <div>
              <h1 className="text-xl font-bold text-white tracking-widest">CTMAS</h1>
              <p className="text-xs text-slate-500">
                Cyber-Physical Threat Monitor
                {meta?.display_name && (
                  <span className="ml-2 px-2 py-0.5 bg-slate-800 rounded text-[10px] text-sky-400 font-bold">
                    {meta.display_name}
                  </span>
                )}
              </p>
            </div>
            <div className="flex flex-col items-end gap-1">
              {frame && (
                <div className="text-xs text-slate-400">
                  T+{frame.timestamp_s}s · {speed}× speed
                </div>
              )}
            </div>
          </div>

          {/* Controls */}
          <div className="mb-3">
            <Controls
              modelChoice={modelChoice}
              onModelChange={setModelChoice}
              speed={speed} paused={paused} connected={connected}
              onSpeed={onSpeed} onPause={onPause}
              onJumpAttack={onJumpAttack} onReconnect={connect}/>
          </div>

          {error && (
            <div className="mb-3 p-3 bg-red-900/30 border border-red-700 rounded text-red-300 text-sm">
              {error} — Start the API: <code className="bg-black/40 px-1">uvicorn api.main:app --port 8000</code>
            </div>
          )}

          {/* Stats */}
          <StatsBar counters={frame?.counters} f1={frame?.running_f1}
                    totalSeen={(frame?.counters?.TP ?? 0)+(frame?.counters?.FP ?? 0)+(frame?.counters?.FN ?? 0)+(frame?.counters?.TN ?? 0)}
                    total={total}/>

          {/* Timeline */}
          <Timeline total={total} windowIdx={frame?.window_idx} events={events} onSeek={onSeek}/>

          {/* Ground truth + decision banner */}
          <GroundTruthBanner frame={frame}/>

          {/* Plant + node bars */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-3 mb-3">
            <div className="bg-slate-900 rounded-lg p-3 border border-slate-800">
              <h2 className="text-xs text-slate-500 uppercase tracking-widest mb-2">Plant Topology</h2>
              <PlantGraph frame={frame}/>
              {frame?.anomaly_nodes?.length > 0 && (
                <div className="mt-2 text-xs">
                  <span className="text-slate-500">Anomalous nodes: </span>
                  {frame.anomaly_nodes.map(n => (
                    <span key={n} className="mr-2 text-red-400 font-bold">{n}</span>
                  ))}
                  <span className="ml-2 px-2 py-0.5 rounded text-xs font-bold"
                    style={{background: severityColor(frame.severity)+"22",
                            color: severityColor(frame.severity),
                            border:`1px solid ${severityColor(frame.severity)}`}}>
                    {frame.anomaly_type}
                  </span>
                </div>
              )}
            </div>

            <div className="bg-slate-900 rounded-lg p-3 border border-slate-800">
              <h2 className="text-xs text-slate-500 uppercase tracking-widest mb-2">
                {nodePanelTitle}
                <span className="text-slate-700 ml-2 normal-case">(red dashed = threshold)</span>
              </h2>
              <NodeErrorBars errs={frame?.node_errors} thr={frame?.node_threshold}/>
            </div>
          </div>

          {/* Z-score (decision signal) + EWMA */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-3 mb-3">
            <div className="bg-slate-900 rounded-lg p-3 border border-slate-800">
              <div className="flex items-center justify-between mb-2">
                <h2 className="text-xs text-slate-500 uppercase tracking-widest">
                  {scoreLabel} — fires when above threshold
                </h2>
                {frame?.predicted_attack && (
                  <span className="text-xs text-red-400 font-bold pulse">⚡ FIRING</span>
                )}
              </div>
              <SignalChart
                history={zHistory}
                thresholdLine={frame?.z_threshold}
                label={scoreLabel}
                color={COLOR.red}
                formatter={v => v?.toFixed?.(2) ?? v}/>
              {frame && (
                <div className="text-xs text-slate-400 mt-1">
                  Current: <span className="text-red-400 font-bold">{frame.z_score_sum?.toFixed(2)}</span>
                  <span className="text-slate-600 ml-2">/ thr {frame.z_threshold?.toFixed(2)}</span>
                </div>
              )}
            </div>

            <div className="bg-slate-900 rounded-lg p-3 border border-slate-800">
              <div className="flex items-center justify-between mb-2">
                <h2 className="text-xs text-slate-500 uppercase tracking-widest">EWMA Early-Warning</h2>
                {frame?.early_warning && (
                  <span className="text-xs text-yellow-400 pulse font-bold">⚠ EARLY WARNING</span>
                )}
              </div>
              <SignalChart
                history={ewmaHistory}
                thresholdLine={frame?.ewma_threshold}
                label="ewma"
                color={COLOR.blue}
                formatter={v => v?.toFixed?.(5) ?? v}/>
              {frame && (
                <div className="text-xs text-slate-400 mt-1">
                  Current: <span className="text-sky-400 font-bold">{frame.ewma_score?.toFixed(5)}</span>
                  <span className="text-slate-600 ml-2">/ thr {frame.ewma_threshold?.toFixed(5)}</span>
                </div>
              )}
            </div>
          </div>

          {/* FSM + MITRE */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
            <div className={`rounded-lg p-3 border-2 transition-all duration-200 ${
                  frame?.severity >= 2 ? "glow-red" : frame?.severity === 1 ? "glow-yellow" : "glow-green"
                }`} style={{borderColor: severityColor(frame?.severity ?? 0), background: COLOR.panel}}>
              <h2 className="text-xs text-slate-500 uppercase tracking-widest mb-2">
                Threat Campaign State (FSM)
              </h2>
              {frame?.threat ? (
                <FsmBar state={frame.threat.state} stage={frame.threat.stage}
                        impactProb={frame.threat.impact_probability}
                        minutesToImpact={frame.threat.minutes_to_impact}/>
              ) : (
                <div className="text-slate-600 text-xs italic">Awaiting frames…</div>
              )}
              {frame?.threat?.description && (
                <p className="text-xs text-slate-300 mt-2">{frame.threat.description}</p>
              )}
            </div>

            <div className="bg-slate-900 rounded-lg p-3 border border-slate-800">
              <h2 className="text-xs text-slate-500 uppercase tracking-widest mb-2">
                MITRE ATT&CK for ICS
              </h2>
              <MitreTechniques techniques={frame?.threat?.techniques}/>
            </div>
          </div>
        </div>
      );
    }

    try {
      ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    } catch (e) {
      document.getElementById("root").innerHTML =
        '<div style="padding:24px;color:#fca5a5;background:#1e1b1b;font-family:monospace;border:1px solid #ef4444;margin:16px;border-radius:8px;white-space:pre-wrap">' +
        '<div style="font-weight:bold;font-size:16px;margin-bottom:8px">React render failed</div>' +
        (e && e.stack ? e.stack : String(e)) + '</div>';
    }
    window.addEventListener("error", function(ev){
      var d = document.createElement("div");
      d.style.cssText = "padding:12px;color:#fca5a5;background:#1e1b1b;font-family:monospace;border:1px solid #ef4444;margin:8px;border-radius:6px;white-space:pre-wrap;font-size:11px";
      d.textContent = "[" + (ev.filename||"?") + ":" + (ev.lineno||"?") + "] " + (ev.message || ev.error);
      document.body.appendChild(d);
    });
  </script>
</body>
</html>
